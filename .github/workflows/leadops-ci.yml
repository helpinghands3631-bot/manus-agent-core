name: LeadOps CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test LeadOps Platform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: leadops_test
          POSTGRES_USER: leadops
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --ignore E501

      - name: Run tests
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          LEAD_SCRAPER_URL: http://localhost:8001
          OUTREACH_URL: http://localhost:8002
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://leadops:testpass@localhost:5432/leadops_test
        run: |
          pytest tests/ -v --tb=short --asyncio-mode=auto

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build core-agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: leadops/core-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
